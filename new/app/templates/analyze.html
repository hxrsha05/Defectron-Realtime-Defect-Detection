<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Inspection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .camera-box {
      border: 2px dashed #ccc;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    img {
      max-height: 400px;
      width: 100%;
    }
  </style>
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h2 class="text-center mb-4">Live Defect Detection</h2>

    <div class="row justify-content-center">
      {% if model == "surface" %}
        <div class="col-md-8 camera-box text-center">
          <h5>Camera Feed</h5>
          <img src="{{ url_for('video_feed') }}?model={{ model }}" alt="Camera Feed">
        </div>
      {% else %}
        <div class="col-md-6 camera-box text-center">
          <h5>Original Feed</h5>
          <img src="{{ url_for('video_feed') }}?model={{ model }}" alt="Camera Feed">
        </div>
        <div class="col-md-6 camera-box text-center">
          <h5>Segmentation Output</h5>
          <img src="{{ url_for('segmentation_feed') }}?model={{ model }}">
        </div>
      {% endif %}
    </div>

    <div class="row justify-content-center mt-3">
      <div class="col-md-4 text-center">
        <button class="btn btn-primary w-100" id="detect-btn">Run Detection</button>
      </div>
    </div>

    <div class="row justify-content-center mt-4">
      <div class="col-md-6">
        <div class="p-3 bg-white shadow rounded">
          <p><strong>Pass/Fail:</strong> <span id="resultPassFail">. . .</span></p>
          <p><strong>Defect:</strong> <span id="resultDefect">. . .</span></p>
          <p><strong>Reason:</strong> <span id="resultReason">. . .</span></p>
          <p><strong>Can Repair/Reuse:</strong> <span id="resultRepair">. . .</span></p>
        </div>
      </div>
    </div>
  </div>

  <!-- jQuery (for AJAX) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <script>
    document.getElementById("detect-btn").addEventListener("click", function () {
      const model = new URLSearchParams(window.location.search).get("model") || "surface";

      fetch("/run_detection", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ model: model })
      })
      .then(response => {
        if (!response.ok) throw new Error("Server error");
        return response.json();
      })
      .then(data => {
        document.getElementById("resultPassFail").textContent = data.pass_fail || "N/A";
        document.getElementById("resultDefect").textContent = data.defect || "N/A";
        document.getElementById("resultReason").textContent = data.reason || "N/A";
        document.getElementById("resultRepair").textContent = data.can_reuse || "N/A";
      })
      .catch(error => {
        alert("Detection failed: " + error.message);
        console.error("Error during detection:", error);
      });
    });
      document.addEventListener("keydown", function (event) {
    if (event.key === "+" || event.key === "=") {
      fetch("/zoom?delta=0.1");
    } else if (event.key === "-" || event.key === "_") {
      fetch("/zoom?delta=-0.1");
    }
  });
  </script>
</body>
</html>
