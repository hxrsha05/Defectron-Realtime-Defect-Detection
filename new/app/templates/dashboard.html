<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Defect Detection Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body class="bg-light">
  <div class="container py-5 text-center">
    <h2>Defect Detection Dashboard</h2>
    <div class="row mt-4 justify-content-center">

      <div class="col-md-4">
        <div class="card">
<img src="{{ url_for('static', filename='images/paint.png') }}" class="card-img-top" alt="Paint Scratch">
          <div class="card-body">
            <h5 class="card-title">PaintVision</h5>
            <a href="/analyze?model=paint" class="btn btn-primary w-100">Inspect</a>
            <a href="/logs?model=paint" class="btn btn-outline-secondary w-100">See Logs</a>

          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card">
<img src="{{ url_for('static', filename='images/weld.png') }}" class="card-img-top" alt="Weld Detection">
          <div class="card-body">
            <h5 class="card-title">WeldVision</h5>
            <a href="/analyze?model=weld" class="btn btn-primary w-100">Inspect</a>
            <a href="/logs?model=weld" class="btn btn-outline-secondary w-100">See Logs</a>

          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card">
<img src="{{ url_for('static', filename='images/surface.png') }}" class="card-img-top" alt="Surface Inspection">
          <div class="card-body">
            <h5 class="card-title">SurfVision</h5>
            <a href="/analyze?model=surface" class="btn btn-primary w-100">Inspect</a>
            <a href="/logs?model=surface" class="btn btn-outline-secondary w-100">See Logs</a>

          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
