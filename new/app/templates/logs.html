<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ model }} Logs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    canvas {
      width: 100% !important;
      height: auto !important;
    }
  </style>
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h2 class="text-center mb-4">{{ model }} Detection Logs</h2>

    <!-- Table -->
    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>Timestamp</th>
          <th>Defect</th>

        </tr>
      </thead>
      <tbody>
        {% for row in entries %}
          <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[2] }}</td>

          </tr>
        {% endfor %}
      </tbody>
    </table>

    <!-- Charts -->
    <div class="row mt-5">
      <div class="col-md-6">
        <h5 class="text-center">Defect Types - Bar Chart</h5>
<canvas id="barChart" style="max-width: 400px; max-height: 300px;"></canvas>      </div>
      <div class="col-md-6">
        <h5 class="text-center">Defect Types - Pie Chart</h5>
 <canvas id="pieChart" style="max-width: 400px; max-height: 300px;"></canvas>      </div>
    </div>

    <!-- Back Button -->
    <div class="text-center mt-5">
      <a href="/" class="btn btn-secondary">Back to Dashboard</a>
    </div>
  </div>

  <script>
  // Chart data safely injected from Jinja2
  const defectData = {{ stats.defects | tojson }};
  const defectLabels = Object.keys(defectData);
  const defectCounts = Object.values(defectData);

  const backgroundColors = defectLabels.map((_, i) => `hsl(${i * 47 % 360}, 70%, 60%)`);

  if (defectLabels.length > 0) {
    // Bar Chart
    new Chart(document.getElementById('barChart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: defectLabels,
        datasets: [{
          label: 'Frequency',
          data: defectCounts,
          backgroundColor: backgroundColors
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              precision: 0
            }
          }
        },
        plugins: {
          legend: { display: false }
        }
      }
    });

    // Pie Chart
    new Chart(document.getElementById('pieChart').getContext('2d'), {
      type: 'pie',
      data: {
        labels: defectLabels,
        datasets: [{
          data: defectCounts,
          backgroundColor: backgroundColors
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'bottom' }
        }
      }
    });
  } else {
    document.getElementById("barChart").outerHTML = "<p class='text-center'>No defects logged.</p>";
    document.getElementById("pieChart").outerHTML = "<p class='text-center'>No defects logged.</p>";
  }
</script>
</body>
</html>
